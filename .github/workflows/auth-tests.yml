# Auth / passkey unit tests.
#
# Runs the WebAuthn + session + token + sign-in test suite on every PR that
# touches auth code. These tests are intentionally DB-FREE (they exercise the
# config resolver, session seal, token codec, and provider factories with env
# alone), so this job needs no Postgres service and stays fast + green.
#
# WHY THIS WORKFLOW EXISTS: the passkey apex regression returned in 2026-06-15
# because correctness lived in unset Vercel env and NO CI job ran the unit
# guard — `.husky/pre-push` runs lint + `build:no-migrate` but never `npm
# test`, so tests gated nothing. tests/auth-webauthn-config.test.ts now pins
# the correct-by-default rpID/expectedOrigins behaviour; this workflow is what
# makes that guard actually block a PR that reintroduces the bug.
#
# Run locally: node --import tsx --test "tests/auth-*.test.ts"

name: auth-tests

on:
  pull_request:
    paths:
      - "lib/auth/**"
      - "lib/env.ts"
      - "app/api/auth/**"
      - "app/**/sign-in/**"
      - "components/auth/**"
      - "tests/auth-*.test.ts"
      - ".github/workflows/auth-tests.yml"
  push:
    branches: [main]
    paths:
      - "lib/auth/**"
      - "lib/env.ts"
      - "app/api/auth/**"
      - "tests/auth-*.test.ts"
      - ".github/workflows/auth-tests.yml"

jobs:
  auth-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run auth / passkey unit tests
        # Unquoted so bash expands the glob to explicit files — node's --test
        # glob support varies by version (node 20 does not expand it), so we
        # never hand node a literal pattern.
        run: node --import tsx --test tests/auth-*.test.ts
