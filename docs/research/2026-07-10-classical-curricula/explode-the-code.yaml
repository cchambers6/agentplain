known_pairings:
  - "Commonly used as independent written practice alongside a teacher-led phonics program (e.g., The Ordinary Parent's Guide to Teaching Reading or All About Reading), since the workbooks reinforce rather than fully teach"
known_conflicts:
  - "Running the full 14-book sequence alongside another complete Orton-Gillingham phonics program is redundant; most families use one as primary and the other as light supplement"
philosophy_notes: "Fill-in-the-blank workbook drill sits at odds with Charlotte Mason's aversion to busywork, so CM families tend to use it sparingly or skip it."
