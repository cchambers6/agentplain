pace: "1 video lesson per week across a 24-week course; daily written assignments between lessons (IEW lesson-planning guidance: roughly 1-2 months per structural unit, units 1-9 over a school year)"
entry_age: 8   # Level A Year 1 targets students reading at a 3rd-5th grade level
typical_completion_time: "24 weeks per level-year (Year 1 and Year 2 available at each level)"
public_scope_and_sequence_url: "https://iew.com/sss-info"
