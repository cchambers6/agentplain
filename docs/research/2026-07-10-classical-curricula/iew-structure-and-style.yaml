  - "IEW theme-based writing lessons (same Structure and Style method applied to themed units)"
known_conflicts:
  - "IEW keyword-outline method and required stylistic 'dress-ups'/checklists conflict with Charlotte Mason pure oral-narration philosophy; CM purists commonly delay or adapt it"
  - "Redundant if run concurrently with another full composition program (e.g., Writing With Ease/Writing With Skill) at the same level"
philosophy_notes: "IEW's structured keyword outlines and mandatory stylistic checklists sit in tension with Charlotte Mason's free narration, so it reads as classical-adjacent skill training rather than a Mason-aligned program."
