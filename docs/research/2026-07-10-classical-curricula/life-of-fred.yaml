# NOTE: format classification — LoF is neither drill-spiral nor strict topic-mastery; it presents each concept once inside a continuous narrative with light practice. "mastery" is the closer bucket per the schema's spiral-or-mastery requirement, but treat it as a supplement-grade spine for most families.
# NOTE: author Stanley F. Schmidt writes the entire series; no teacher manuals or tests at the elementary level.
