pace: "self-paced narrative chapters (a chapter per sitting is common); publisher states Apples through Mineshaft (13 books) takes about 16-21 months total"
entry_age: "6 (publisher: start anywhere between 1st and 4th grade depending on reading readiness; begin with Apples if addition facts are not yet cold)"
typical_completion_time: "multiple books per year; ~16-21 months for the full elementary + intermediate arc (publisher-stated)"
public_scope_and_sequence_url: https://lifeoffred.com/elementary.html   # verified 2026-07-10; full series order (Apples-Jelly Beans + Kidneys/Liver/Mineshaft), placement guidance, pacing — publisher has no formal S&S grid
typical_price_range: "$19 per elementary hardback (Apples verified at $19.00 on shop.lifeoffred.com); ~$190 for the 10-book elementary series"
known_pairings:
  - math-u-see: "LoF narrative enrichment over a skill-drill mastery spine"
  - saxon-math: "LoF is the classic 'story antidote' supplement to Saxon's dry spiral drill"
  - rightstart-mathematics: "adds independent reading-based math to a parent-intensive program"
known_conflicts:
  - saxon-math: "as co-equal spines the mastery-style once-through narrative and Saxon's spiral review sequence contradict each other — use LoF as supplement, not parallel spine"
philosophy_notes: "Excellent Charlotte Mason fit — a genuine living-book approach with short story-driven lessons, though most families add a practice-heavy spine since built-in exercises ('Your Turn to Play') are sparse."
