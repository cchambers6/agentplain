# Queue: grouped by track. Governor picks the track by rotation (heartbeat
# STEP 2b), then pops that track's first item. ceo is perpetual (exactly one
# item, re-enqueued each pass). Seed 2026-07-03: 24 finite items (3 per track
# across the 8 non-ceo tracks) + the perpetual ceo item. Every pass ends with
# a deliverable (design decision / fix spec / action) — no new analysis layers.
queue:
  # --- ceo (perpetual — always exactly one) ---
  - pass: null
    track: ceo
    mode: recurring
    scope: "CEO pass: design the shortest path to a profitable business — read state + newest track outputs + memory; update docs/ceo/<date>/ with decisions, not analysis: the current critical-path order, the biggest lever, and what to cut; re-enqueue this item"
    reason: "perpetual highest-priority lens; first pass fired manually 2026-07-02"
    priority: 1
    last_completed_at: 2026-07-02T22:00:00Z

  # --- chief-of-staff ---
  - pass: null
    track: chief-of-staff
    mode: recurring
    scope: "Sequenced blocker list + Conner decision queue: reconcile the kaizen MASTER synthesis first-5 (stamp wiring, CI floor, guarantee leak, data-min branch, Conner-queue SLA) and the product-audit MASTER top-20 into one ordered list with a recommended default per Conner item"
    reason: "two MASTER syntheses exist but no single sequenced queue; Conner-time is the scarcest input"
    priority: 1
    last_completed_at: null
  - pass: null
    track: chief-of-staff
    mode: recurring
    scope: "Redundancy sweep: open PRs, unmerged audit/kaizen branches (retros 01/05/06/08 read from unmerged PRs #336/#341/#339/#340), duplicate branches, worktree sprawl — kill / merge / land recommendations"
    reason: "kaizen 1/10 found PR-less committed work and 41% of PRs >1k insertions; unmerged retros are invisible to the fleet"
    priority: 2
    last_completed_at: null
  - pass: null
    track: chief-of-staff
    mode: recurring
    scope: "Dependency map for the first-paying-customer path: order of operations across the Connect-button first-value fix, connectors P0s (audit 5/10), portal activation (audit 6/10), guarantee saved-time writers (audit 9/10)"
    reason: "loop-v2 seed found first-value path dies at the Connect button; these fixes have unstated ordering dependencies"
    priority: 3
    last_completed_at: null

  # --- product-owner ---
  - pass: null
    track: product-owner
    mode: piece
    scope: "Product-owner lens: connectors page + marketplace (piece = surface). Am I delivering value / profitable to run? Baseline: audit 5/10 3 P0s (TaxDome/Karbon available-but-unconnectable, tile Connect bypasses disclosure, positioning branch unmerged)"
    reason: "activation-critical surface with the worst open P0 count"
    priority: 1
    last_completed_at: null
  - pass: null
    track: product-owner
    mode: piece
    scope: "Product-owner lens: Plaino agent (chat + support surfaces). Value delivered vs token cost per conversation; degraded-mode experience; two-surface /api/chat mode flag health"
    reason: "the named service partner IS the product experience; no owner-level value/cost verdict exists"
    priority: 2
    last_completed_at: null
  - pass: null
    track: product-owner
    mode: piece
    scope: "Product-owner lens: marketing home (front door). Who lands, what wants it addresses (cite journey want ids), conversion path to signup; baseline = marketing deep-dive front-door play + Truth Wave constraints"
    reason: "front door of the funnel; marketing deep-dive named it play #1"
    priority: 3
    last_completed_at: null

  # --- l1-journey (carried over from v2 queue; L2 runs in-pass) ---
  - pass: 2
    track: l1-journey
    mode: coverage
    scope: "L1+L2 coverage: law + property-management — personas from the ratified JTBD tables in lib/verticals/{law,property-management}/content.ts (buyer role + heaviest daily-user role per vertical; if only one role is ratified, map that one and record the gap)"
    reason: "largest unmapped area: two whole verticals at depth 0"
    priority: 1
    last_completed_at: null
  - pass: 3
    track: l1-journey
    mode: coverage
    scope: "L1+L2 coverage: general vertical (buyer persona from its JTBD table) + DEPTH on real-estate--individual-agent (raise depth to 2: fill buying-stage thinness, verify Today-tab per-agent scoping verdict, expand daily-use micro-moments)"
    reason: "last unmapped vertical, paired with the shallowest existing map (18 wants, under floor)"
    priority: 2
    last_completed_at: null
  - pass: 4
    track: l1-journey
    mode: depth
    scope: "L1+L2 DEPTH: cpa (both personas to depth 2) — tighten the pass-1 gap set: split the practice-mgmt blocker into per-agent wants, add audit-senior/CSM/admin personas as new maps, re-verdict anything the fleet shipped since pass 1"
    reason: "highest open_gap_count vertical (38 open across 2 personas) once coverage saturates"
    priority: 3
    last_completed_at: null

  # --- l2-profitability (standalone re-scores; no new L1 stage) ---
  - pass: null
    track: l2-profitability
    mode: rescore
    scope: "Re-score real-estate profitability rows (docs/profitability/2026-07-02/) against everything the fleet merged since pass 1; note verdict changes, file/expire backlog cards accordingly"
