  # --- agent-audit ---
  - pass: null
    track: agent-audit
    mode: agent
    scope: "Agent audit: support-handler pipeline (draft-into-review, resolve-reply) — value per run, cost shape, human review time, keep/fix/retire"
    reason: "highest-frequency agent family in the customer path"
    priority: 1
    last_completed_at: null
  - pass: null
    track: agent-audit
    mode: agent
    scope: "Agent audit: per-vertical killer-workflow runtimes (5 demos, PR #303) — do they run on real data yet, cost per run, are they in the profit path or demo-ware"
