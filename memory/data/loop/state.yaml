  # --- tab-audit ---
  - pass: null
    track: tab-audit
    mode: route-group
    scope: "Tab audit: the workspace 5-tab IA (Today / Plaino / Connections / Reports / Account) — purpose, lander, wants addressed (cite want ids), delivering verdict per route; baseline = audit 3/10 (missing loading.tsx, settings silent-null) — verify, don't re-derive"
