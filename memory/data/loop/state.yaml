  # --- vertical-priority ---
  - pass: null
    track: vertical-priority
    mode: recurring
    scope: "Double-down / hold / cut scorecard across RE, CPA, law, PM, general — evidence = coverage_map gap counts, L2 roll-ups, sales deep-dive priors (RE/GA beachhead; CPA/law closed till 2 RE pilots)"
