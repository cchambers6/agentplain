# Written by track passes (own close-out) and the L3 governor (30-min tick).
# v3 reseed 2026-07-03: 9-track rotation, no stop condition — every pass
# designs the business toward profitability (the objective, not a gate) and
# must end with a declared deliverable. Pass 1 (L1+L2 seed) and the manual
# CEO / chief-of-staff first passes (2026-07-02) predate this schema.
