  # --- business-model (proposals only; lib/billing/facts.ts is SSOT, never edited) ---
  - pass: null
    track: business-model
    mode: proposal
    scope: "Tier-fit review: Regular/Partner/Max promises vs delivered value per the journey maps — where a tier over-promises (guarantee undercounting, portal 0%-activatable) propose the honest fix: deliver, re-scope, or re-price. Proposal doc only"
    reason: "audits 6/9/10 show tier promises ahead of delivery — a churn and refund risk priced into no tier"
    priority: 1
    last_completed_at: null
  - pass: null
    track: business-model
    mode: proposal
