    mode: route-group
    scope: "Tab audit: marketing site routes (/, /how-it-works, /compare, /pricing, /waitlist, /verticals/*, /style) — incl. the stale /how-it-works redirect shadowing #283 (audit 1/10 P0)"
    reason: "funnel-entry routes; a known P0 redirect may still be live"
