<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-label="placeholder heritage scene: about · the working town">
  <!-- PLACEHOLDER — non-blocking stand-in. Real asset swaps in at public/brand/plaino-system/scenes/about-hero.png -->
  <rect width="1800" height="1100" fill="#F7F4ED"/>
  <!-- low land band (Moss) -->
  <rect x="0" y="682" width="1800" height="418" fill="#3F5C3F" opacity="0.16"/>
  <!-- horizon line (Ink hairline) + low rise -->
  <path d="M0 682 H1800" stroke="#1A1A1F" stroke-width="2" opacity="0.55"/>
  <path d="M900 682 Q1296 591 1692 682" fill="none" stroke="#1A1A1F" stroke-width="2" opacity="0.35"/>
  <!-- a single distant clay roof (the one Clay charge in the land) -->
  <path d="M252 682 l88 0 l-44 -39 z" fill="#B65D3A" opacity="0.85"/>
  <!-- Plaino silhouette: calm working dog, head up, watching -->
  <g fill="#1A1A1F">
    <!-- body -->
    <rect x="1208" y="571" width="176" height="81" rx="21"/>
    <!-- legs -->
    <rect x="1229" y="638" width="21" height="44"/>
    <rect x="1335" y="638" width="21" height="44"/>
    <!-- head -->
    <rect x="1314" y="516" width="60" height="69" rx="14"/>
    <!-- ear (up, alert) -->
    <path d="M1324 520 l0 -28 l21 20 z"/>
    <!-- tail -->
    <path d="M1208 581 q-32 -10 -28 -44" fill="none" stroke="#1A1A1F" stroke-width="18" stroke-linecap="round"/>
  </g>
  <!-- collar tag: the single Clay charge on the dog -->
  <circle cx="1317" cy="581" r="21" fill="#B65D3A"/>
  <!-- placeholder labelling (Mute) — makes it unmistakably a stand-in -->
  <text x="108" y="154" font-family="ui-monospace, Menlo, monospace" font-size="31" fill="#726A5E" letter-spacing="2">PLACEHOLDER · ABOUT · THE WORKING TOWN</text>
  <text x="108" y="204" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#726A5E" opacity="0.8">1800×1100 · pose standing-watch · awaiting real asset</text>
</svg>
