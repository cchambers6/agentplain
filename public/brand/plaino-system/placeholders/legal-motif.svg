<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="placeholder heritage scene: legal · we keep it safe">
  <!-- PLACEHOLDER — non-blocking stand-in. Real asset swaps in at public/brand/plaino-system/scenes/legal.png -->
  <rect width="600" height="600" fill="#F7F4ED"/>
  <!-- low land band (Moss) -->
  <rect x="0" y="372" width="600" height="228" fill="#3F5C3F" opacity="0.16"/>
  <!-- horizon line (Ink hairline) + low rise -->
  <path d="M0 372 H600" stroke="#1A1A1F" stroke-width="2" opacity="0.55"/>
  <path d="M300 372 Q432 322 564 372" fill="none" stroke="#1A1A1F" stroke-width="2" opacity="0.35"/>
  <!-- a single distant clay roof (the one Clay charge in the land) -->
  <path d="M84 372 l48 0 l-24 -21 z" fill="#B65D3A" opacity="0.85"/>
  <!-- Plaino silhouette: calm working dog, head up, watching -->
  <g fill="#1A1A1F">
    <!-- body -->
    <rect x="384" y="312" width="96" height="44" rx="12"/>
    <!-- legs -->
    <rect x="396" y="348" width="12" height="24"/>
    <rect x="453" y="348" width="12" height="24"/>
    <!-- head -->
    <rect x="442" y="282" width="33" height="37" rx="8"/>
    <!-- ear (up, alert) -->
    <path d="M447 284 l0 -15 l12 11 z"/>
    <!-- tail -->
    <path d="M384 317 q-17 -6 -15 -24" fill="none" stroke="#1A1A1F" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- collar tag: the single Clay charge on the dog -->
  <circle cx="444" cy="317" r="12" fill="#B65D3A"/>
  <!-- placeholder labelling (Mute) — makes it unmistakably a stand-in -->
  <text x="36" y="84" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#726A5E" letter-spacing="2">PLACEHOLDER · LEGAL · WE KEEP IT SAFE</text>
  <text x="36" y="111" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#726A5E" opacity="0.8">600×600 · pose guarding · awaiting real asset</text>
</svg>
