<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1000" viewBox="0 0 2000 1000" role="img" aria-label="placeholder heritage scene: verticals · the ten">
  <!-- PLACEHOLDER — non-blocking stand-in. Real asset swaps in at public/brand/plaino-system/scenes/verticals.png -->
  <rect width="2000" height="1000" fill="#F7F4ED"/>
  <!-- low land band (Moss) -->
  <rect x="0" y="620" width="2000" height="380" fill="#3F5C3F" opacity="0.16"/>
  <!-- horizon line (Ink hairline) + low rise -->
  <path d="M0 620 H2000" stroke="#1A1A1F" stroke-width="2" opacity="0.55"/>
  <path d="M1000 620 Q1440 537 1880 620" fill="none" stroke="#1A1A1F" stroke-width="2" opacity="0.35"/>
  <!-- a single distant clay roof (the one Clay charge in the land) -->
  <path d="M280 620 l80 0 l-40 -35 z" fill="#B65D3A" opacity="0.85"/>
  <!-- Plaino silhouette: calm working dog, head up, watching -->
  <g fill="#1A1A1F">
    <!-- body -->
    <rect x="1360" y="519" width="160" height="74" rx="19"/>
    <!-- legs -->
    <rect x="1379" y="580" width="19" height="40"/>
    <rect x="1475" y="580" width="19" height="40"/>
    <!-- head -->
    <rect x="1456" y="469" width="54" height="63" rx="13"/>
    <!-- ear (up, alert) -->
    <path d="M1466 473 l0 -26 l19 18 z"/>
    <!-- tail -->
    <path d="M1360 528 q-29 -9 -26 -40" fill="none" stroke="#1A1A1F" stroke-width="16" stroke-linecap="round"/>
  </g>
  <!-- collar tag: the single Clay charge on the dog -->
  <circle cx="1459" cy="528" r="19" fill="#B65D3A"/>
  <!-- placeholder labelling (Mute) — makes it unmistakably a stand-in -->
  <text x="120" y="140" font-family="ui-monospace, Menlo, monospace" font-size="28" fill="#726A5E" letter-spacing="2">PLACEHOLDER · VERTICALS · THE TEN</text>
  <text x="120" y="185" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#726A5E" opacity="0.8">2000×1000 · pose scouting · awaiting real asset</text>
</svg>
