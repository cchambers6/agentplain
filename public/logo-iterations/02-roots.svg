  <rect width="400" height="220" fill="#F7F4ED"/>
  <g id="mark" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- ground line (thinner — soil surface) -->
    <line x1="174" y1="38" x2="226" y2="38" stroke-width="1.1" opacity="0.55"/>
