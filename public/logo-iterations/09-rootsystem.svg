<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="agentplain — intelligence rooted in reality" style="color:#1A1A1F">
  <rect width="400" height="220" fill="#F7F4ED"/>
  <g id="mark" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- soil line at top (high — leaves room for root system to dominate) -->
    <line x1="172" y1="22" x2="228" y2="22" stroke-width="1.4"/>
    <!-- small stem nub above soil (the visible plant) -->
    <line x1="200" y1="22" x2="200" y2="16" stroke-width="1.6"/>
    <!-- main taproot -->
    <path d="M200 22 C200 32 199 42 198 56" stroke-width="1.7"/>
    <!-- primary branch roots -->
    <path d="M200 28 C194 32 190 38 187 44" stroke-width="1.3"/>
    <path d="M200 30 C206 34 210 40 213 46" stroke-width="1.3"/>
    <path d="M199 40 C194 46 192 50 190 56" stroke-width="1.2"/>
    <path d="M199 42 C204 48 207 52 210 58" stroke-width="1.2"/>
    <!-- secondary hair roots branching off primary -->
    <path d="M191 40 C189 44 188 46 187 50" stroke-width="0.9"/>
    <path d="M210 42 C212 46 213 48 214 52" stroke-width="0.9"/>
    <path d="M195 50 C194 54 193 56 192 58" stroke-width="0.8"/>
    <path d="M205 50 C206 54 207 56 208 58" stroke-width="0.8"/>
    <path d="M198 50 C197 54 197 57 197 60" stroke-width="0.8"/>
  </g>
  <text x="200" y="135" text-anchor="middle" font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-size="52" font-weight="500" fill="currentColor" letter-spacing="-0.8">agentplain</text>
  <text x="200" y="175" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', monospace" font-size="9.5" font-weight="500" fill="currentColor" letter-spacing="3.6">INTELLIGENCE  ROOTED  IN  REALITY</text>
</svg>
