  <!-- TOP: wordmark + vertical eyebrow -->
  <text x="80" y="96" font-family="ui-monospace, 'Courier New', monospace" font-size="20" letter-spacing="3.6" fill="#726A5E">AGENTPLAIN</text>
  
  <!-- MIDDLE: headline + value-prop one-liner -->
  <text x="80" y="280" font-family="Georgia, 'Times New Roman', Times, serif" font-size="72" fill="#1A1A1F" letter-spacing="-2">Intelligence.</text>
  <text x="80" y="356" font-family="Georgia, 'Times New Roman', Times, serif" font-size="72" fill="#1A1A1F" letter-spacing="-2">Rooted in <tspan fill="#B65D3A">reality</tspan>.</text>
  <text x="80" y="440" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#2E2E33">Claude for Small Business is powerful. We make it usable — the service</text><text x="80" y="474" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#2E2E33">layer that runs it for you.</text>
