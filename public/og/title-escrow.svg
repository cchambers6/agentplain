  <text x="80" y="130" font-family="ui-monospace, 'Courier New', monospace" font-size="18" letter-spacing="3" fill="#B65D3A">FOR TITLE &amp; ESCROW</text>
  <!-- MIDDLE: headline + value-prop one-liner -->
  <text x="80" y="300" font-family="Georgia, 'Times New Roman', Times, serif" font-size="56" fill="#1A1A1F" letter-spacing="-1">The fleet for the local title</text><text x="80" y="366" font-family="Georgia, 'Times New Roman', Times, serif" font-size="56" fill="#1A1A1F" letter-spacing="-1">agency.</text>
  <text x="80" y="450" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#2E2E33">The closing-file skills, agents, and memory you'd otherwise have to build</text><text x="80" y="484" font-family="system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#2E2E33">yourself</text>
